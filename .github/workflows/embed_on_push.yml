name: Re-embed knowledge base on push

on:
  push:
    branches: [main]
    paths:
      - 'knowledge-base/**'

jobs:
  embed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run embedding
        run: python scripts/embed_docs.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: re-embedded vector store"
          file_pattern: 'scripts/vector_store/'
