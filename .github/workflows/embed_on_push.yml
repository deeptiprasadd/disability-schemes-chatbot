name: Re-embed knowledge base on push

on:
  push:
    branches: [main]
    paths:
      - 'knowledge-base/**'

jobs:
  embed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run embedding
        run: python scripts/embed_docs.py

      - name: Commit updated vector store
        run: |
          git config user.name "embed-bot"
          git config user.email "bot@scheme-assistant.in"
          git add scripts/vector_store/
          git diff --staged --quiet || git commit -m "Auto: re-embedded vector store $(date +%Y-%m-%d)"
          git push origin HEAD:main
