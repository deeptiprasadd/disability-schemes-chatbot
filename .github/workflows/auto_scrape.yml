name: Monthly scrape and update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape_schemes.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit new files
        run: |
          git config user.name "scheme-bot"
          git config user.email "bot@scheme-assistant.in"
          git add knowledge-base/ scripts/seen_hashes.json
          git diff --staged --quiet || git commit -m "Auto: scraped new schemes $(date +%Y-%m-%d)"
          git push origin HEAD:main
